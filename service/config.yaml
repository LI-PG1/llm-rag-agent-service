# RAG 知识问答服务配置
# 对应成品库① · 浙江电信

# ── 文档切分 ──
# chunk=512 基于电信手册段落长度分布：多数按步骤/条款分节，长度 300-600 token
# 512 能覆盖单节内容又不溢出。overlap=64 保段落边界上下文不丢
# 基于业务方评估选定，未做严格 ablation（标注集不足）
chunk:
  size: 512
  overlap: 64

# ── 向量化 ──
embedding:
  model: "gte-Qwen2-1.5B-instruct"
  dimension: 1536
  batch_size: 32
  timeout: 30  # 秒

# ── 向量库 ──
vector_store:
  type: "chroma"                # chroma / milvus
  milvus:
    host: ${MILVUS_HOST:-localhost}
    port: ${MILVUS_PORT:-19530}
    collection: "telecom_docs"
  chroma_path: "./data/chroma_db"
  hnsw:
    M: 16
    ef_construction: 200
    ef_search: 64

# ── 检索 ──
retrieval:
  top_k_dense: 50
  top_k_rerank: 5
  rerank_score_threshold: 0.4
  rrf_k: 60                    # RRF 平滑常数
  bm25_weight: 0.4
  dense_weight: 0.6

# ── 查询改写（长尾低频消歧）──
query_rewrite:
  enabled: true
  model: "Qwen3.5-122B-A10B"

# ── 生成 ──
# 预研试过单模型统一路由，但 14B 处理复杂query质量不够、122B 跑简单问答成本浪费
# 最终决定简单→14B快速通道、复杂→122B高容量通道
llm:
  base_url: ${LLM_BASE_URL:-http://localhost:8000/v1}
  api_key: ${LLM_API_KEY:-not-needed}
  timeout: 60
  models:
    simple: "DeepSeek-R1-Distill-Qwen-14B"
    complex: "Qwen3.5-122B-A10B"

# ── Corrective RAG ──
corrective_rag:
  max_retry: 2
  min_chunks: 1

# ── 服务 ──
service:
  host: "0.0.0.0"
  port: 8000
  redis_url: ${REDIS_URL:-redis://localhost:6379/0}
  cache_ttl: 3600              # 1h
  session_ttl: 3600

# ── 评估 ──
evaluation:
  query_path: "./data/queries.json"
